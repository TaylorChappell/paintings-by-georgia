<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Paintings by Georgia</title>
    <script>
      // GitHub Pages SPA redirect
      // Takes the current URL path and redirects to index.html
      // with the path encoded as a query parameter
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
